<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Superman</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle at center, #1e3c72, #000814);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
        }

        .logo {
            font-size: 200px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow:
                0 0 10px #ffcc00,
                0 0 20px #ff0000,
                0 0 40px #ff0000,
                0 0 80px #ff0000;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from {
                text-shadow:
                    0 0 5px #ffcc00,
                    0 0 10px #ff0000;
            }
            to {
                text-shadow:
                    0 0 20px #ffcc00,
                    0 0 40px #ff0000,
                    0 0 80px #ff0000;
            }
        }

        h1 {
            font-size: 40px;
            margin-top: 20px;
            color: #00aaff;
        }

        p {
            max-width: 600px;
            margin: 10px auto;
            font-size: 18px;
            color: #cfd8dc;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            background: linear-gradient(90deg, #ff0000, #ffcc00);
            color: black;
            font-size: 16px;
            cursor: pointer;
            border-radius: 25px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px #ffcc00;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="logo">S</div>

        <h1>SUPERMAN</h1>

        <p>
            Superman is one of the most iconic superheroes, known for his strength, 
            speed, and ability to fly. Born on Krypton and raised on Earth, 
            he protects humanity as a symbol of hope and justice.
        </p>

        <button class="btn">Explore More</button>
    </div>

</body>
</html>
