name: ironman-website

on:
  push:
    branches:
      - main
    paths:
      - 'appbox/ironman/**' 
      - '.github/workflows/ironman-website.yml' # 👈 only trigger when this folder changes
  workflow_dispatch:              # 👈 allow manual run 

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🐳 Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🔍 Debug Folder Structure
        run: |
          ls -R

      - name: 🔨 Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ironman2:latest ./appbox/ironman

      - name: 🚀 Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ironman2:latest
